{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Upload</title>
    
    <!-- Bootstrap CSS CDN -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container-fluid p-2 m-4">
        <div class="row">
            <div class="col-sm-12 col-md-8 offset-md-2">
                <div id="facultyuploadform">
                    <form id="faculty-upload-form" method="post" enctype="multipart/form-data" class="form-inline">
                        {% csrf_token %}
                        <div class="form-group mr-3 mb-2">
                            <label for="file" class="mr-2">Upload Excel file:</label>
                            <input type="file" name="file" id="file" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary mb-2">Upload</button>
                    </form>
                    <div id="message2"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- jQuery and Bootstrap JS CDN -->
     <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    
    <!-- Custom JS -->
    <script src="{% static 'dashboard/custom.js' %}"></script>
</body>

</html>
