{% extends "base.html" %}

{% block noticeblock %}
 <!-- Header Start -->
    <div class="container-fluid bg-primary py-5 mb-5 page-header">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-10 text-center">
                    <h1 class="display-3 text-white animated slideInDown">Result</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb justify-content-center">
                            <li class="breadcrumb-item"><a class="text-white" href="/">Home</a></li>
                            <li class="breadcrumb-item"><a class="text-white" href="#">Pages</a></li>
                            <li class="breadcrumb-item text-white active" aria-current="page">About</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <!-- Header End -->

  <div class="container-xxl py-5">
  <div class="container">
    <div class="row g-5">
      <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.1s" style="min-height: 400px;">
        {% if result.photo %}
        <div class="position-relative h-100">
          <img class="img-fluid position-absolute w-100 h-100" src="{{result.photo.url}}" alt=""
            style="object-fit: cover;">
        </div>
        {% endif %}
      </div>
      <div class="col-lg-6 wow fadeInUp" data-wow-delay="0.3s">
        <h6 class="section-title bg-white text-start text-primary pe-3">Notice</h6>
        <h1 class="mb-4">{{result.title}}</h1>
        <p class="mb-4">{{result.content | safe}}</p>
        {% if result.pdf %}<p style="font-weight: bold;">To download <a href="{{result.pdf.url}}" download>click</a> here</p>{% endif %}
      </div>
    </div>
  </div>
</div>


{% endblock%}
