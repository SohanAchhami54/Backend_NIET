{% extends "base.html" %}

{% block syllabusdetailblock %}
 <!-- Header Start -->
    <div class="container-fluid bg-primary py-5 mb-5 page-header">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-10 text-center">
                    <h1 class="display-3 text-white animated slideInDown">Syllabus</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb justify-content-center">
                            <li class="breadcrumb-item"><a class="text-white" href="/">Home</a></li>
                            <li class="breadcrumb-item"><a class="text-white" href="#">Pages</a></li>
                            <li class="breadcrumb-item text-white active" aria-current="page">About</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <!-- Header End -->

    <div class="container-xxl py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="syllabus-detail bg-light p-5 rounded">
                    <div class="text-center mb-4">
                        <p class="display-6">{{ syllabus.title }}</p>
                    </div>
                    <div class="mb-4">
                        {{ syllabus.content|safe }}
                    </div>
                    {% if syllabus.pdf %}
                    <div class="text-center">
                        <a href="{{ syllabus.pdf.url }}" class="btn btn-primary btn-lg" target="_blank">
                            <i class="fas fa-file-pdf"></i> Download PDF
                        </a>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
