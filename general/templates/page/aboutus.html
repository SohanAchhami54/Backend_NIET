{% extends "base.html" %}

{% block aboutus %}
 <!-- Header Start -->
    <div class="container-fluid bg-primary py-5 mb-5 page-header">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-10 text-center">
                    <h1 class="display-3 text-white animated slideInDown">About Us</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb justify-content-center">
                            <li class="breadcrumb-item"><a class="text-white" href="/">Home</a></li>
                            <!-- <li class="breadcrumb-item"><a class="text-white" href="#">Pages</a></li> -->

                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <!-- Header End -->

            <h1 class="mb-5">Meet Our Board Members</h1>
        </div>

        <!-- Full-Time Faculties -->

        <div class="row g-4 mb-5">
            {% for member in members %}
            <div class="col-lg-3 col-md-6 wow fadeInUp" data-wow-delay="0.1s">
                <div class="team-item bg-light">
                    <div class="overflow-hidden">
                        <img class="img-fluid" src="{{member.photo.url}}" alt="">
                    </div>
                    <!-- <div class="position-relative d-flex justify-content-center" style="margin-top: -23px;">

                            <a class="btn btn-sm-square btn-primary mx-1" href=""><i class="fab fa-instagram"></i></a>
                        </div>
                    </div> -->
                    <div class="text-center p-4">
                        <h5 class="mb-0">{{member.full_name}}</h5>
                        <!-- <h6 class="mb-0">{{member.designation}}</h6> -->
                        <!-- <small>{{member.post_name}}</small> -->
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
        </div>
        </div>
        


<!-- Chairman's Message Section -->
<div class="container-xxl py-5 ">
    <div class="container">
        <div class="text-center mb-5">
            <h2 class="mb-4">Message from the Chairman</h2>
        </div>
        <div class="row align-items-center">
            <div class="col-lg-4 text-center">
                <img src="{{chairman.photo.url}}" class="img-fluid rounded-circle mb-3" alt="Chairman Image" style="max-width: 200px;">
            </div>
            <div class="col-lg-8">
                <p>{{chairman.message|safe}}</p>
                <h5 class="mt-4">{{chairman.full_name}}</h5>
                <p>Chairman</p>
            </div>
        </div>
    </div>
</div>
