{% extends "base.html" %}

{% block aboutus %}
  <div class="untree_co-hero overlay" style="background-image: url('{{about.about_image.url}}');">
    <div class="container">
      <div class="row align-items-center justify-content-center">
        <div class="col-12">
          <div class="row justify-content-center ">
            <div class="col-lg-6 text-center ">
              <h1 class="mb-4 heading text-white" data-aos="fade-up" data-aos-delay="100">About Us</h1>
              <div class="mb-5 text-white desc mx-auto" data-aos="fade-up" data-aos-delay="200">
                <!-- <p class="text-justify">{{about.about_text|safe}}</p> -->
              </div>

              <p class="mb-0" data-aos="fade-up" data-aos-delay="300"><a href="#" class="btn btn-secondary">Explore courses</a></p>

            </div>


          </div>

        </div>

      </div> <!-- /.row -->
    </div> <!-- /.container -->

  </div> <!-- /.untree_co-hero -->




  <div class="services-section">
    <div class="container">
      <div class="row justify-content-between">
        <div class="col-lg-4 mb-5 mb-lg-0">
        <div class="section-title mb-3" data-aos="fade-up" data-aos-delay="0">
            <h2 class="line-bottom mb-4">About Us</h2>
          </div>
          <p data-aos="fade-up" data-aos-delay="100" class="text-justify">{{ about.about_text|safe }}</p>

          <p data-aos="fade-up" data-aos-delay="300"><a href="#" class="btn btn-primary">Get Started</a></p>

        </div>
        <div class="col-lg-6" data-aos="fade-up" data-aos-delay="0">
          <figure class="img-wrap-2">
            <img src="{{ chairman.faculty.photo.url }}" alt="Image" class="img-fluid">
            <div class="dotted"></div>
          </figure>

        <div class="section-title mb-3" data-aos="fade-up" data-aos-delay="0">
            <h2 class="line-bottom mb-4">Message From Chairman</h2>
          </div>

          <p data-aos="fade-up" data-aos-delay="100">{{ chairman.message|safe }}</p>

        </div>
      </div>
    </div>
  </div>



{% endblock %}
