{% extends "base.html" %}

{% block syllabusdetailblock %}
 <!-- Header Start -->
    <div class="container-fluid bg-primary py-5 mb-5 page-header">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-lg-10 text-center">
                    <h1 class="display-3 text-white animated slideInDown">Eligiblity Criteria</h1>
                    <nav aria-label="breadcrumb">
                        <ol class="breadcrumb justify-content-center">
                            <li class="breadcrumb-item"><a class="text-white" href="/">Home</a></li>
                            <!-- <li class="breadcrumb-item"><a class="text-white" href="#">Pages</a></li> -->
                            <li class="breadcrumb-item text-white active" aria-current="page">Eligiblity Detail</li>
                        </ol>
                    </nav>
                </div>
            </div>
        </div>
    </div>
    <!-- Header End -->

<div class="container-xxl py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-12 col-sm-12 col-md-12">
                <div class="syllabus-detail  p-5 rounded">
                    <div class="text-center mb-4">
                        <p class="display-6">{{ result.title }}</p>
                    </div>
                    <div class="mb-4">
                        {{ result.content|safe }}
                    </div>
                    {% if result.pdf %}
                    <div class="text-center">
                        <embed src="{{ result.pdf.url }}" type="application/pdf" width="100%" height="600px">
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
