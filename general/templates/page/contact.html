{% extends "base.html" %}

{% block contactus %}
<div class="untree_co-hero overlay" style="background-image: url('{{about.about_image.url}}');">
    <div class="container">
        <div class="row align-items-center justify-content-center">
            <div class="col-12">
                <div class="row justify-content-center ">
                    <div class="col-lg-6 text-center ">
                        <h1 class="mb-4 heading text-white" data-aos="fade-up" data-aos-delay="100">Contact Us</h1>
                        <div class="mb-5 text-white desc mx-auto" data-aos="fade-up" data-aos-delay="200">
                            <!-- <p>Another free template by <a href="https://untree.co/" target="_blank" class="link-highlight">Untree.co</a>. Far far away, behind the word mountains, far from the countries Vokalia and Consonantia, there live.</p> -->
                        </div>

                        <p class="mb-0" data-aos="fade-up" data-aos-delay="300"><a href="#"
                                class="btn btn-secondary">Explore courses</a></p>

                    </div>


                </div>

            </div>

        </div> <!-- /.row -->
    </div> <!-- /.container -->

</div> <!-- /.untree_co-hero -->




<div class="untree_co-section">
    <div class="container">

        <div class="row mb-5">
            <div class="col-lg-4 mb-5 order-2 mb-lg-0" data-aos="fade-up" data-aos-delay="100">
                <div class="contact-info">

                    <div class="address mt-4">
                        <i class="icon-room"></i>
                        <h4 class="mb-2">Location:</h4>
                        <p>{{about.address|safe}}</p>
                    </div>

                    <div class="open-hours mt-4">
                        <i class="icon-clock-o"></i>
                        <h4 class="mb-2">Open Hours:</h4>
                        <p>
                            Sunday-Friday:<br>
                            11:00 AM - 2300 PM
                        </p>
                    </div>

                    <div class="email mt-4">
                        <i class="icon-envelope"></i>
                        <h4 class="mb-2">Email:</h4>
                        <p>{{about.email_address|safe}}</p>
                    </div>

                    <div class="phone mt-4">
                        <i class="icon-phone"></i>
                        <h4 class="mb-2">Call:</h4>
                        <p>{{about.telephone|safe}}</p>
                    </div>

                </div>
            </div>
            <div class="col-lg-7 mr-auto order-1" data-aos="fade-up" data-aos-delay="200">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3532.8823151606866!2d85.30994197546677!3d27.690031976192536!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x39eb196dbb40549f%3A0x3f9d741f06ffa32b!2sCollege%20of%20Biomedical%20Engineering%20and%20Applied%20Sciences!5e0!3m2!1sen!2snp!4v1717844127704!5m2!1sen!2snp"
                    width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </div>


        <div class="row mb-5">
            <div class="col-lg-8 mb-5 order-2 mb-lg-0" data-aos="fade-up" data-aos-delay="100">
            <form id="messageForm" method="POST" class="appointment-form ftco-animate">
              {% csrf_token %}
                    <div class="row">
                        <div class="col-6 mb-3">
                            <input type="text" class="form-control" placeholder="Your Name">
                        </div>
                        <div class="col-6 mb-3">
                            <input type="email" class="form-control" placeholder="Your Email">
                        </div>
                        <div class="col-12 mb-3">
                            <input type="text" class="form-control" placeholder="Subject">
                        </div>
                        <div class="col-12 mb-3">
                            <textarea name="" id="" cols="30" rows="7" class="form-control"
                                placeholder="Message"></textarea>
                        </div>

                        <div class="col-12">
                            <input type="submit" value="Send Message" class="btn btn-primary">
                        </div>
                    </div>
                </form>
            </div>
            <div class="col-lg-2 mr-auto order-1" data-aos="fade-up" data-aos-delay="200">

            </div>
        </div>


    </div>
</div>

<script>
    $(document).ready(function(){
    $('#messageForm').on('submit', function(e){
        e.preventDefault(); 
        alert("hello")
        $.ajax({
            type: 'POST',
            url: '/handle/message/', 
            data: $('#messageForm').serialize(), 
            success: function(response){
                console.log(response);
                alert('Form submitted successfully!');
            },
            error: function(error){
                // Handle errors
                console.log(error);
                alert('Error submitting form!');
            }
        });
    });
});
</script>
{% endblock %}
