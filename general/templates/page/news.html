{% extends "base.html" %}

{% block newsblock %}

  <div class="untree_co-hero overlay" style="background-image: url('{{about.about_image.url}}');">
    <div class="container">
      <div class="row align-items-center justify-content-center">
        <div class="col-12">
          <div class="row justify-content-center ">
            <div class="col-lg-6 text-center ">
              <h1 class="mb-4 heading text-white" data-aos="fade-up" data-aos-delay="100">News</h1>
              <div class="mb-5 text-white desc mx-auto" data-aos="fade-up" data-aos-delay="200">
                <!-- <p>Another free template by <a href="https://untree.co/" target="_blank" class="link-highlight">Untree.co</a>. Far far away, behind the word mountains, far from the countries Vokalia and Consonantia, there live.</p> -->
              </div>

              <p class="mb-0" data-aos="fade-up" data-aos-delay="300"><a href="#" class="btn btn-secondary">Explore courses</a></p>

            </div>


          </div>

        </div>

      </div> <!-- /.row -->
    </div> <!-- /.container -->

  </div> <!-- /.untree_co-hero -->




  <div class="untree_co-section bg-light">
    <div class="container">
      <div class="row align-items-stretch">
        {% for news in newscontents %}
        <div class="col-lg-6 p-2"  data-aos="fade-up" data-aos-delay="100">
          <div class="media-h d-flex h-100">
            <figure>
              <img src="{{news.photo.url}}" alt="Image">
            </figure>
            <div class="media-h-body">
              <h2 class="mb-3"><a href="#">{{news.title}}</a></h2>
              <div class="meta mb-2"><span class="icon-calendar mr-2"></span><span>{{news.created_at}}</span>  <span class="icon-person mr-2"></span>Admin</div>
              <p>{{news.content|safe}}</p>
              <p><a href="#">Learn More</a></p>
            </div>
          </div>
        </div> 
        {% endfor %}

      </div>

      <!-- <div class="row mt-5">
        <div class="col-12 text-center">
          <ul class="list-unstyled custom-pagination">
            <li><a href="#">1</a></li>
            <li class="active"><a href="#">2</a></li>
            <li><a href="#">3</a></li>
            <li><a href="#">4</a></li>
          </ul>
        </div>
      </div> -->

    </div>
  </div>


{% endblock%}
