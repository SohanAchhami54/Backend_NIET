{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/animate.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/owl.carousel.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/owl.theme.default.min.css' %}">
    <link rel="stylesheet" href="{% static 'css/jquery.fancybox.min.css' %}">
    <link rel="stylesheet" href="{% static 'fonts/icomoon/style.css' %}">
    <link rel="stylesheet" href="{% static 'fonts/flaticon/font/flaticon.css' %}">
    <link rel="stylesheet" href="{% static 'css/aos.css' %}">
    <link rel="stylesheet" href="{% static 'dashboard/styles.css' %}">

</head>

<body>

    <nav class="navbar navbar-light bg-light">
        <a class="navbar-brand" href="#">Dashboard</a>
    </nav>

    <div class="container-fluid p-2 m-4">
        <div class="row">
            <div class="col-sm-12 col-md-4">
                <ul class="list-group">
                    <li class="list-group-item active" aria-current="true" id="uploadstudent">Upload Student</li>
                    <li class="list-group-item " id="uploadfaculty">Upload Faculty</li>
                </ul>
            </div>
            <div class="col-sm-12 col-md-8">
                <div id="uploadform" style="display: none;">
                    <form id="student-upload-form" method="post" enctype="multipart/form-data" class="form-inline">
                        {% csrf_token %}
                        <div class="form-group mr-3 mb-2">
                            <label for="file" class="mr-2">Upload Excel file:</label>
                            <input type="file" name="file" id="file" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary mb-2">Upload</button>
                    </form>
                    <div id="message"></div>
                </div>

                <div id="facultyuploadform" style="display: none;">
                    <form id="faculty-upload-form" method="post" enctype="multipart/form-data" class="form-inline">
                        {% csrf_token %}
                        <div class="form-group mr-3 mb-2">
                            <label for="file" class="mr-2">Upload Excel file:</label>
                            <input type="file" name="file" id="file" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-primary mb-2">Upload</button>
                    </form>
                    <div id="message2"></div>
                </div>


            </div>
        </div>
    </div>


    <script src="{% static 'js/jquery-3.4.1.min.js' %} "></script>
    <script src="{% static 'js/popper.min.js' %}"></script>
    <script src="{% static 'js/bootstrap.min.js' %}"></script>
    <script src="{% static 'js/owl.carousel.min.js' %}"></script>
    <script src="{% static 'js/jquery.animateNumber.min.js' %}"></script>
    <script src="{% static 'js/jquery.waypoints.min.js' %}"></script>
    <script src="{% static 'js/jquery.fancybox.min.js' %}"></script>
    <script src="{% static 'js/jquery.sticky.js' %}"></script>
    <script src="{% static 'js/aos.js' %}"></script>
    <script src="{% static 'dashboard/custom.js' %}"></script>
</body>

</html>
